<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orios Bank - Secure Banking</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container" id="app">
        <!-- Auth Section -->
        <div id="auth-section" class="fade-in">
            <header>
                <div class="logo">
                    <i class="fas fa-shield-halved"></i>
                    <span>ORIOS<span>BANK</span></span>
                </div>
            </header>

            <div class="auth-card">
                <div class="auth-tabs">
                    <button id="login-tab" class="active">Login</button>
                    <button id="register-tab">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form">
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to access your account</p>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary">Sign In <i class="fas fa-arrow-right"></i></button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form hidden">
                    <h2>Create Account</h2>
                    <p>Join Orios Bank for a better financial future</p>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Password" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="reg-phone" placeholder="Phone Number" required>
                    </div>
                    <button type="submit" class="btn-primary">Get Started <i class="fas fa-user-plus"></i></button>
                </form>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden">
            <nav class="sidebar">
                <div class="logo">
                    <i class="fas fa-shield-halved"></i>
                    <span>ORIOS</span>
                </div>
                <ul class="nav-links">
                    <li class="active" data-page="overview"><i class="fas fa-chart-pie"></i><span>Overview</span></li>
                    <li data-page="accounts"><i class="fas fa-wallet"></i><span>Accounts</span></li>
                    <li data-page="transactions"><i class="fas fa-exchange-alt"></i><span>Transactions</span></li>
                    <li data-page="transfer"><i class="fas fa-paper-plane"></i><span>Transfer</span></li>
                    <li data-page="loans"><i class="fas fa-hand-holding-usd"></i><span>Loans</span></li>
                    <li data-page="cards"><i class="fas fa-credit-card"></i><span>My Cards</span></li>
                    <li id="admin-nav" class="hidden" data-page="admin"><i class="fas fa-user-shield"></i><span>Admin Panel</span></li>
                </ul>
                <div class="nav-footer">
                    <button id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
                </div>
            </nav>

            <main class="content">
                <header class="top-bar">
                    <div class="user-info">
                        <span id="user-greeting">Hello, User</span>
                        <div class="avatar" id="user-avatar">U</div>
                    </div>
                </header>

                <div id="page-content" class="fade-in">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </main>
        </div>
    </div>

    <div id="notification-container"></div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal fade-in">
            <div class="modal-header">
                <h3 id="modal-title">Open New Account</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="modal-form">
                    <!-- Dynamic form content -->
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
